name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 全量 pytest
        run: python -m pytest tests/ -q

  frontend:
    name: Web production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 安装依赖
        run: npm ci --prefix web
      - name: 生产构建（含 tsc 类型检查）
        run: npm run build --prefix web

  benchmark-leak:
    name: Benchmark keyword leak check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: 产品代码不得包含 benchmark 特征词
        # 发布闸门口径：app/ 与 web/src/ 中出现 SheetBench 案例特征词
        # 视为针对评测集的过拟合，直接失败。
        run: |
          hits=$(grep -riE 'sheetbench|realhit' app/ web/src/ || true)
          if [ -n "$hits" ]; then
            echo "发现 benchmark 特征词泄漏："
            echo "$hits"
            exit 1
          fi
          echo "无泄漏。"
